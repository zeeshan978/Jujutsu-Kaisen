<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJK: Ultimate Cursed Technique</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'MS Gothic', 'Courier New', sans-serif; transition: background 0.5s ease; }
    
        #ui {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            color: #fff;
            pointer-events: none;
            z-index: 10;
        }
        
        .jp-text { 
            font-size: 3.5rem; 
            display: block; 
            font-weight: 900;
            letter-spacing: 12px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        
        #technique-name { 
            font-size: 1.2rem; 
            font-weight: bold; 
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        #video-container {
            position: absolute;
            bottom: 2%;
            left: 18%;
            transform: translateX(-50%) scaleX(-1);
            width: 85vw;
            max-width: 450px;
            height: 42vh; 
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 20;
            background-color: #000; 
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; opacity: 0;
            transition: opacity 0.1s ease;
        }

        #grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="grain"></div>
    <div id="flash-overlay"></div>

    <div id="ui">
        <span id="jp-display" class="jp-text">呪力</span>
        <div id="technique-name">CURSED ENERGY</div>
    </div>

    <div id="video-container">
        <video class="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 55;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    // --- Lightning System ---
    class CursedLightning {
        constructor() {
            this.lines = [];
            this.mat = new THREE.LineBasicMaterial({ transparent: true, opacity: 0.8 });
            for(let i=0; i<6; i++) {
                const line = new THREE.Line(new THREE.BufferGeometry(), this.mat.clone());
                line.visible = false;
                scene.add(line);
                this.lines.push(line);
            }
        }
        update(color) {
            this.lines.forEach(line => {
                line.visible = true;
                line.material.color.set(color);
                const pts = [];
                let curr = new THREE.Vector3((Math.random()-0.5)*30, (Math.random()-0.5)*30, 0);
                for(let i=0; i<6; i++) {
                    pts.push(curr.clone());
                    curr.lerp(new THREE.Vector3(0,0,0), 0.25);
                    curr.x += (Math.random()-0.5)*12;
                    curr.y += (Math.random()-0.5)*12;
                    curr.z += (Math.random()-0.5)*10;
                }
                line.geometry.setFromPoints(pts);
            });
        }
        hide() { this.lines.forEach(l => l.visible = false); }
    }
    const lightning = new CursedLightning();

    // --- Particle System ---
    const COUNT = 20000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(COUNT * 3);
    const colors = new Float32Array(COUNT * 3);
    const sizes = new Float32Array(COUNT);
    
    const targetPositions = new Float32Array(COUNT * 3);
    const targetColors = new Float32Array(COUNT * 3);
    const targetSizes = new Float32Array(COUNT);

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const particles = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.3, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false }));
    scene.add(particles);

    // --- Technique Math ---
    function getRed(i) {
        if(i < COUNT * 0.1) {
            const r = Math.random() * 9;
            const theta = Math.random() * 6.28; const phi = Math.acos(2 * Math.random() - 1);
            return { x: r * Math.sin(phi) * Math.cos(theta), y: r * Math.sin(phi) * Math.sin(theta), z: r * Math.cos(phi), r: 1, g: 0.1, b: 0.1, s: 2.5 };
        } else {
            const armCount = 3; const t = (i / COUNT); 
            const angle = t * 15 + ((i % armCount) * (Math.PI * 2 / armCount));
            const radius = 2 + (t * 40); 
            return { x: radius * Math.cos(angle), y: radius * Math.sin(angle), z: (Math.random() - 0.5) * (10 * t), r: 0.8, g: 0, b: 0, s: 1.0 };
        }
    }

    function getVoid(i) {
        const t = i / COUNT;
        const z = (t - 0.5) * 250; // Deep tunnel
        const angle = t * Math.PI * 60; // Spiral
        const radius = 22 + Math.sin(t * 15) * 6; // Pulsing walls
        return { 
            x: Math.cos(angle) * radius, 
            y: Math.sin(angle) * radius, 
            z: z, 
            r: 0.2 + Math.random()*0.3, g: 0.7, b: 1.0, s: 1.5 
        };
    }

    function getPurple(i) {
        if (Math.random() > 0.85) return { x: (Math.random() - 0.5) * 120, y: (Math.random() - 0.5) * 120, z: (Math.random() - 0.5) * 120, r: 0.4, g: 0.1, b: 0.8, s: 0.8 };
        const r = 22; const theta = Math.random() * Math.PI * 2; const phi = Math.acos(2 * Math.random() - 1);
        return { x: r * Math.sin(phi) * Math.cos(theta), y: r * Math.sin(phi) * Math.sin(theta), z: r * Math.cos(phi), r: 0.7, g: 0.1, b: 1.0, s: 3.5 };
    }

    function getShrine(i) {
        const total = COUNT;
        if (i < total * 0.3) return { x: (Math.random()-0.5)*90, y: -18, z: (Math.random()-0.5)*90, r: 0.5, g: 0, b: 0, s: 0.9 };
        else if (i < total * 0.4) {
            const px = ((i%4)<2?1:-1)*14; const pz = ((i%4)%2==0?1:-1)*9;
            return { x: px+(Math.random()-0.5)*2, y: -18+Math.random()*35, z: pz+(Math.random()-0.5)*2, r: 0.2, g: 0.1, b: 0.1, s: 0.7 };
        } else if (i < total * 0.6) {
            const t = Math.random() * Math.PI * 2; const rad = Math.random() * 35;
            const curve = Math.pow(rad/35, 2) * 12; 
            return { x: rad*Math.cos(t), y: 18 - curve, z: rad*Math.sin(t)*0.7, r: 0.7, g: 0, b: 0, s: 0.7 };
        } else return { x: 0, y: 0, z: 0, r: 0, g: 0, b: 0, s: 0 };
    }

    // --- State Management ---
    let currentTech = 'neutral';
    let shakeIntensity = 0;
    let glowColor = '#00ffff';
    const flashEl = document.getElementById('flash-overlay');
    const jpEl = document.getElementById('jp-display');
    const nameEl = document.getElementById('technique-name');

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.75 });

    hands.onResults((results) => {
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        let detected = 'neutral';

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            results.multiHandLandmarks.forEach((lm) => {
                drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {color: glowColor, lineWidth: 5});
                const isUp = (t, p) => lm[t].y < lm[p].y;
                const pinch = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
                
                // Detection Logic
                if (results.multiHandLandmarks.length === 2) detected = 'void';
                else if (pinch < 0.04) detected = 'purple';
                else if (isUp(8,6) && isUp(12,10) && isUp(16,14)) detected = 'shrine';
                else if (isUp(8,6)) detected = 'red';
            });
            lightning.update(glowColor);
        } else {
            lightning.hide();
        }
        updateState(detected);
    });

    function updateState(tech) {
        if(currentTech === tech) return;
        currentTech = tech;
        
        shakeIntensity = tech !== 'neutral' ? 0.45 : 0;
        flashEl.style.opacity = '0.6';
        setTimeout(() => flashEl.style.opacity = '0', 120);

        const config = {
            'shrine': { jp: "伏魔御厨子", en: "Domain Expansion: Malevolent Shrine", color: "#ff0000", bloom: 3.0, bg: "radial-gradient(circle, #200 0%, #000 100%)" },
            'purple': { jp: "虚式「茈」", en: "Secret Technique: Hollow Purple", color: "#bb00ff", bloom: 4.5, bg: "#000" },
            'void': { jp: "無量空処", en: "Domain Expansion: Infinite Void", color: "#00ffff", bloom: 3.5, bg: "radial-gradient(circle, #001233 0%, #000 100%)" },
            'red': { jp: "術式反転「赫」", en: "Reverse Cursed Technique: Red", color: "#ff3333", bloom: 2.8, bg: "#000" },
            'neutral': { jp: "呪力", en: "Neutral State", color: "#00ffff", bloom: 1.0, bg: "#000" }
        };

        const c = config[tech];
        glowColor = c.color;
        jpEl.innerText = c.jp;
        jpEl.style.textShadow = `0 0 30px ${c.color}`;
        nameEl.innerText = c.en;
        nameEl.style.color = c.color;
        bloomPass.strength = c.bloom;
        flashEl.style.backgroundColor = c.color;
        document.body.style.background = c.bg;

        for(let i=0; i<COUNT; i++) {
            let p;
            if(tech === 'neutral') {
                if(i < COUNT * 0.05) {
                    const r = 15 + Math.random()*20; const t = Math.random()*6.28; const ph = Math.random()*3.14;
                    p = { x: r*Math.sin(ph)*Math.cos(t), y: r*Math.sin(ph)*Math.sin(t), z: r*Math.cos(ph), r: 0.1, g: 0.1, b: 0.2, s: 0.4 };
                } else p = { x:0, y:0, z:0, r:0, g:0, b:0, s:0 };
            }
            else if(tech === 'red') p = getRed(i);
            else if(tech === 'void') p = getVoid(i);
            else if(tech === 'purple') p = getPurple(i);
            else if(tech === 'shrine') p = getShrine(i);
            
            targetPositions[i*3] = p.x; targetPositions[i*3+1] = p.y; targetPositions[i*3+2] = p.z;
            targetColors[i*3] = p.r; targetColors[i*3+1] = p.g; targetColors[i*3+2] = p.b;
            targetSizes[i] = p.s;
        }
    }

    const videoElement = document.querySelector('.input_video');
    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            const canvasElement = document.getElementById('output_canvas');
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            await hands.send({image: videoElement});
        }, width: 640, height: 480
    });
    cameraUtils.start();

    function animate() {
        requestAnimationFrame(animate);
        
        if (shakeIntensity > 0) {
            renderer.domElement.style.transform = `translate(${(Math.random()-0.5)*shakeIntensity*50}px, ${(Math.random()-0.5)*shakeIntensity*50}px)`;
        } else {
            renderer.domElement.style.transform = 'translate(0,0)';
        }

        const pos = particles.geometry.attributes.position.array;
        const col = particles.geometry.attributes.color.array;
        const siz = particles.geometry.attributes.size.array;

        for(let i=0; i<COUNT*3; i++) {
            pos[i] += (targetPositions[i] - pos[i]) * 0.1;
            col[i] += (targetColors[i] - col[i]) * 0.1;
        }
        for(let i=0; i<COUNT; i++) siz[i] += (targetSizes[i] - siz[i]) * 0.1;

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;
        particles.geometry.attributes.size.needsUpdate = true;
        
        if(currentTech === 'void') {
            particles.rotation.z += 0.01;
            camera.position.z = 55 + Math.sin(Date.now()*0.002)*5; // Breathing camera
        } else if(currentTech === 'red') {
            particles.rotation.z -= 0.15;
        } else if (currentTech === 'purple') {
            particles.rotation.z += 0.25; 
            particles.rotation.y += 0.08;
        } else if (currentTech === 'shrine') {
            particles.rotation.set(0, 0, 0); 
        } else {
            particles.rotation.y += 0.005;
            camera.position.z = 55;
        }

        composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
